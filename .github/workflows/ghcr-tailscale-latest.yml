name: Build GHCR on Tailscale Latest

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      tailscale_version:
        description: 'Tailscale module version, for example v1.84.0. Empty means Go module latest.'
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      should_build: ${{ steps.image.outputs.should_build }}
      tailscale_version: ${{ steps.tailscale.outputs.version }}
      image: ${{ steps.image.outputs.name }}
      latest_image: ${{ steps.image.outputs.latest }}
    steps:
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false

      - name: Resolve Tailscale module version
        id: tailscale
        env:
          INPUT_VERSION: ${{ github.event.inputs.tailscale_version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            version="$INPUT_VERSION"
          else
            version="$(go list -m -json tailscale.com@latest | jq -r '.Version')"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check whether GHCR image tag already exists
        id: image
        env:
          TAILSCALE_VERSION: ${{ steps.tailscale.outputs.version }}
        run: |
          repository="$(echo "ghcr.io/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          image="${repository}:${TAILSCALE_VERSION}"
          latest="${repository}:latest"

          echo "name=$image" >> "$GITHUB_OUTPUT"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"

          if docker buildx imagetools inspect "$image" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push GHCR image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ needs.check.outputs.image }}
            ${{ needs.check.outputs.latest_image }}
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
